version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cae_postgres
    environment:
      POSTGRES_USER: cae
      POSTGRES_PASSWORD: cae
      POSTGRES_DB: caedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cae -d caedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cae_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cae_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cae:cae@postgres:5432/caedb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_PATH=/app/storage
      - MOCK_CAD_MODE=false
      - MOCK_SOLVER_MODE=false
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - shared_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cae_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://cae:cae@postgres:5432/caedb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_PATH=/app/storage
      - MOCK_CAD_MODE=false
      - MOCK_SOLVER_MODE=false
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - shared_storage:/app/storage
      - solver_workspace:/tmp/cae_jobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      calculix:
        condition: service_started
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q default,priority

  # ── Celery Flower (monitoring) ───────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cae_flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.workers.celery_app flower --port=5555

  # ── CalculiX Solver Container ────────────────────────────────
  calculix:
    build:
      context: ./solver-containers/calculix
      dockerfile: Dockerfile
    container_name: cae_calculix
    volumes:
      - solver_workspace:/workspace
    # Keeps container alive; worker SSHs in or uses docker exec
    command: tail -f /dev/null

  # ── React Frontend (dev) ─────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: cae_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  shared_storage:
  solver_workspace:
